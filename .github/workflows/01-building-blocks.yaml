name: 01 - Building Blocks

on: push

jobs:
    echo-hello:
        runs-on: ubuntu-latest
        steps:
            - name: SayHello World
              run: echo "Hello, World!"
    echo-goodbye:
        runs-on: ubuntu-latest
        steps:
            - name: Successful step
              run: |
                echo "This step will succeed"
                exit 0
            - name: Say Goodbye World
              run: echo "Goodbye, World!"