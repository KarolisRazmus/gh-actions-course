name: 04 - Using Actions

on: workflow_dispatch

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 04-using-actions/react-app
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: '20.x'
            - name: Install dependencies
              run: npm install
            - name: Run tests
              run: npm test

            # - name: Run a command
            #   run: node --version