name: 08 - Using Variables

on:
    push:
    workflow_dispatch:

env:
    GLOBAL_VAR: "I am a global var"

jobs:
    echo:
        runs-on: ubuntu-latest
        env:
            JOB_VAR: "I am a job var"
        steps:
            - name: Print Env Variables
              env:
                STEP_VAR: "I am a step var"
                step_var2: "I am another step var"
              run: |
                echo "Step Variable: ${{  env.STEP_VAR }}"
                echo "Step Variable 2: ${{  env.step_var2 }}"
                echo "Job Variable: ${{  env.JOB_VAR }}"
                echo "Global Variable: ${{  env.GLOBAL_VAR }}"